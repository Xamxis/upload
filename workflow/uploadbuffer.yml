name: Upload to Buffer

on:
  push:
    branches: [ main ]

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload to Buffer
        uses: bufferapp/buffer-action@v1
        with:
          access_token: ${{ secrets.BUFFER_TOKEN }}
          video: output.mp4
          text: 'Mein Video!'
